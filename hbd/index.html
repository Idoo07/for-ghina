<!DOCTYPE html>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
overflow-x:hidden;
overflow-y:auto;
min-height:100vh;
background:linear-gradient(135deg,#ffb6c1,#ffc0cb,#ffd6e7);
color:white;
}

.screen{
position:absolute;
left:0;
top:0;
width:100%;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
transition:0.7s;
overflow-x:hidden;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(.9);
}

h1{
margin-bottom:20px;
text-shadow:0 3px 10px rgba(0,0,0,.2);
}

button{
border:none;
padding:14px 25px;
margin:8px;
border-radius:50px;
background:white;
color:#ff4d88;
font-size:16px;
font-weight:bold;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.cake{
font-size:90px;
margin-bottom:20px;
animation:float 2s infinite;
}

.gift{
font-size:130px;
cursor:pointer;
animation:bounce 1.2s infinite;
}

.letter{
font-size:120px;
cursor:pointer;
animation:float 2s infinite;
}

.message-box{
background:rgba(255,255,255,.2);
backdrop-filter:blur(8px);
padding:25px;
border-radius:20px;
max-width:700px;
width:100%;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

#typed{
line-height:1.8;
font-size:18px;
white-space:pre-line;
}


.flower{
position:absolute;
top:-50px;
font-size:25px;
animation:fall linear infinite;
}

.heart{
position:absolute;
bottom:-50px;
font-size:20px;
animation:up linear infinite;
} 

#screen5{
position:relative;
overflow-y:auto;
max-height:100vh;
justify-content:flex-start;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(360deg);
}
}

@keyframes up{
to{
transform:translateY(-120vh);
}
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.small{
font-size:20px;
margin-bottom:20px;
}

.music-btn{
position:fixed;
top:15px;
right:15px;
z-index:999;
} 

html,
body{
width:100%;
max-width:100%;
overflow-x:hidden;
}
</style>
</head>

let i = 0;

function typeWriter(){

const target = document.getElementById("typed");

if(i < text.length){
target.innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,15);
}

}

function createFlower(){

const flower=document.createElement("div");

flower.className="flower";

const arr=["🌸","🌷","🌹"];

flower.innerHTML=arr[Math.floor(Math.random()*arr.length)];

flower.style.left=Math.random()*95+"vw";

flower.style.animationDuration=
(Math.random()*5+5)+"s";

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},10000);

}

setInterval(createFlower,500);

function createHeart(){

(Math.random()*4+4)+"s";
